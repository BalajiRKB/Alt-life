<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: #111;
      font-family: monospace;
      font-size: 14px;
      padding: 40px;
    }

    h1 {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    p.sub {
      color: #555;
      margin-bottom: 28px;
      font-size: 13px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    label {
      font-size: 13px;
      color: #333;
    }

    input[type="date"] {
      border: 1px solid #111;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 13px;
      background: #fff;
      color: #111;
      outline: none;
    }

    button {
      border: 1px solid #111;
      padding: 6px 16px;
      background: #111;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    thead tr {
      border-bottom: 2px solid #111;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #333;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .overdue td {
      color: #c00;
    }

    .empty {
      padding: 24px 12px;
      color: #888;
      font-size: 13px;
    }

    .count {
      margin-top: 16px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Library &mdash; Pending Returns</h1>
  <p class="sub">Books that have not been returned as of the selected date.</p>

  <div class="controls">
    <label for="datePicker">Date</label>
    <input type="date" id="datePicker">
    <button onclick="loadData()">Check</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Member</th>
        <th>Book</th>
        <th>Author</th>
        <th>Issued On</th>
        <th>Due By</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td class="empty" colspan="5">Select a date and click Check.</td></tr>
    </tbody>
  </table>

  <div class="count" id="countLine"></div>

  <script>
    const API_KEY = 'mysecretapikey123';

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('datePicker').value = today;

    async function loadData() {
      const date = document.getElementById('datePicker').value;
      if (!date) return;

      const tbody = document.getElementById('tableBody');
      const countLine = document.getElementById('countLine');
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading...</td></tr>';
      countLine.textContent = '';

      try {
        const res = await fetch(`/issuance/pending?date=${date}`, {
          headers: { 'x-api-key': API_KEY }
        });
        const data = await res.json();

        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">No pending returns on this date.</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(row => {
          const isOverdue = new Date(row.target_return_date) < new Date(date);
          return `<tr class="${isOverdue ? 'overdue' : ''}">
            <td>${row.member_name}</td>
            <td>${row.book_title}</td>
            <td>${row.author}</td>
            <td>${row.issued_date.split('T')[0]}</td>
            <td>${row.target_return_date.split('T')[0]}${isOverdue ? ' (overdue)' : ''}</td>
          </tr>`;
        }).join('');

        countLine.textContent = `${data.length} record${data.length > 1 ? 's' : ''} found.`;

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty">Error: ${err.message}</td></tr>`;
      }
    }
  </script>

</body>
</html>
